<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stella Matutina</title>
  <style>
    @font-face {
      font-family: 'ToftH';
      src: url('fonts/ToftH-Grotesk-Bold (3).otf') format('opentype');
      font-weight: 700;
    }
    @font-face {
      font-family: 'ToftH';
      src: url('fonts/ToftH-Grotesk-Light (2).otf') format('opentype');
      font-weight: 300;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0a;
      font-family: 'ToftH', sans-serif;
    }

    /* ── GALLERY ── */
    .gallery {
      position: fixed;
      inset: 0;
    }

    .slide {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: none;
    }

    .slide.active {
      opacity: 1;
    }

    .slide:nth-child(1)  { background-image: url('images/01.jpg'); }
    .slide:nth-child(2)  { background-image: url('images/02.jpg'); }
    .slide:nth-child(3)  { background-image: url('images/03.jpg'); }
    .slide:nth-child(4)  { background-image: url('images/04.jpg'); }
    .slide:nth-child(5)  { background-image: url('images/05.jpg'); }
    .slide:nth-child(6)  { background-image: url('images/06.jpg'); }
    .slide:nth-child(7)  { background-image: url('images/07.jpg'); }
    .slide:nth-child(8)  { background-image: url('images/09.jpg'); }
    .slide:nth-child(9)  { background-image: url('images/10.jpg'); }
    .slide:nth-child(10) { background-image: url('images/11.jpg'); }
    .slide:nth-child(11) { background-image: url('images/12.jpg'); }
    .slide:nth-child(12) { background-image: url('images/13.jpg'); }

    /* subtle dark vignette over images */
    .gallery::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.45) 100%);
      pointer-events: none;
      z-index: 1;
    }

    .counter {
      display: none;
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transition: background 0.4s ease;
    }

    .dot.active {
      background: rgba(255,255,255,0.9);
    }

    /* ── ABOUT BUTTON ── */
    .about-btn {
      position: fixed;
      top: 28px;
      right: 36px;
      z-index: 10;
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'ToftH', sans-serif;
      font-weight: 300;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.85);
      padding: 6px 0;
      transition: color 0.2s ease;
    }

    .about-btn:hover {
      color: #fff;
    }

    /* ── OVERLAY ── */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: flex-start;
      justify-content: flex-end;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }

    .overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    .overlay-bg {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .about-card {
      position: relative;
      z-index: 1;
      background: rgba(245, 243, 240, 0.96);
      border: none;
      padding: 24px 28px;
      max-width: 480px;
      width: calc(100% - 48px);
      margin-top: 60px;
      margin-right: 36px;
    }

    .about-card h2 {
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.4);
      margin-bottom: 12px;
    }

    .about-card p {
      font-weight: 300;
      font-size: 12px;
      line-height: 1.75;
      color: rgba(0,0,0,0.85);
    }

    .close-btn {
      position: absolute;
      top: 12px;
      right: 16px;
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'ToftH', sans-serif;
      font-weight: 300;
      font-size: 20px;
      color: rgba(0,0,0,0.35);
      line-height: 1;
      transition: color 0.2s ease;
    }

    .close-btn:hover {
      color: rgba(0,0,0,0.8);
    }


  </style>
</head>
<body>

  <!-- GALLERY -->
  <div class="gallery" id="gallery">
    <div class="slide active"></div>
    <div class="slide"></div>
    <div class="slide"></div>
    <div class="slide"></div>
    <div class="slide"></div>
    <div class="slide"></div>
    <div class="slide"></div>
    <div class="slide"></div>
    <div class="slide"></div>
    <div class="slide"></div>
    <div class="slide"></div>
    <div class="slide"></div>
  </div>

  <!-- DOTS -->
  <div class="counter" id="counter">
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>


  <button class="about-btn" id="aboutBtn">About</button>

  <!-- ABOUT OVERLAY -->
  <div class="overlay" id="overlay">
    <div class="overlay-bg" id="overlayBg"></div>
    <div class="about-card">
      <button class="close-btn" id="closeBtn">×</button>
      <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat.</p>
    </div>
  </div>

  <script>
    const slides = document.querySelectorAll('.slide');
    const dots = document.querySelectorAll('.dot');
    let current = 0;

    function goTo(index) {
      slides[current].classList.remove('active');
      dots[current].classList.remove('active');
      current = index % slides.length;
      slides[current].classList.add('active');
      dots[current].classList.add('active');
    }

    // Cursor-driven cycling
    let moveTimeout;
    let cycleTimer;
    let moving = false;

    function startCycling() {
      if (moving) return;
      moving = true;
      cycleTimer = setInterval(() => goTo(current + 1), 200);
    }

    function stopCycling() {
      moving = false;
      clearInterval(cycleTimer);
    }

    document.addEventListener('mousemove', () => {
      startCycling();
      clearTimeout(moveTimeout);
      moveTimeout = setTimeout(stopCycling, 120);
    });

    // About modal
    const overlay = document.getElementById('overlay');
    const aboutBtn = document.getElementById('aboutBtn');
    const closeBtn = document.getElementById('closeBtn');
    const overlayBg = document.getElementById('overlayBg');

    aboutBtn.addEventListener('click', () => overlay.classList.add('visible'));
    function closeOverlay() { overlay.classList.remove('visible'); }
    closeBtn.addEventListener('click', closeOverlay);
    overlayBg.addEventListener('click', closeOverlay);
  </script>

</body>
</html>
